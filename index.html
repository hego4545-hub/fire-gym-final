<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire Gym Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #111; color: white; font-family: 'Cairo', sans-serif; text-align: center; padding: 50px 20px; }
        .card { background: #1c1c1c; padding: 30px; border-radius: 20px; border: 1px solid #e53935; margin-top: 20px; }
        h1 { color: #e53935; font-size: 35px; }
    </style>
</head>
<body>
    <h1>FIRE GYM PRO 🦁</h1>
    <p>تم التحديث بنجاح!</p>

    <div class="card">
        <h3>جدول تمارينك 🏋️</h3>
        <p style="color: #888; margin-top: 10px;">سيتم رفع الجدول هنا خلال ساعات.</p>
    </div>

    <div class="card" style="background: #0d47a1;">
        <h3>متابع المياه 💧</h3>
        <h1 id="count">0</h1>
        <button onclick="document.getElementById('count').innerText++" style="padding: 10px 20px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer;">+1 كوب</button>
    </div>
</body>
</html>
