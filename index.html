<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fire Gym | Management</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff3d00; --bg: #000; --card: #111; --text: #fff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo', sans-serif; }
        body { background:var(--bg); color:var(--text); }
        .screen { display:none; padding:20px; min-height:100vh; }
        .screen.active { display:block; }
        .form-group { background:var(--card); padding:20px; border-radius:20px; border:1px solid #222; margin-top:20px; }
        input, select { width:100%; padding:15px; margin:10px 0; border-radius:12px; background:#000; color:#fff; border:1px solid #333; }
        .btn { width:100%; padding:18px; border-radius:12px; background:var(--primary); color:#fff; font-weight:900; border:none; cursor:pointer; font-size:16px; box-shadow:0 10px 20px rgba(255,61,0,0.2); }
        .member-card { background:#111; padding:20px; border-radius:15px; border:1px solid #222; margin-bottom:15px; border-right:4px solid #444; }
        .status-pending { color: #ff9800; } .status-approved { color: #4caf50; }
    </style>
</head>
<body>

    <!-- الدخول -->
    <div id="screen-login" class="screen active" style="text-align:center;">
        <h1 style="color:var(--primary); font-size:45px; margin-top:50px;">FIRE <span>GYM</span></h1>
        <div class="form-group">
            <input type="tel" id="login-phone" placeholder="رقم الموبايل المسجل">
            <button class="btn" onclick="login()">دخول البطل 🔥</button>
            <p style="margin-top:20px; color:#888;" onclick="showScreen('screen-register')">بطل جديد؟ سجل بياناتك من هنا</p>
        </div>
    </div>

    <!-- التسجيل -->
    <div id="screen-register" class="screen">
        <h2>نموذج انضمام بطل جديد 📝</h2>
        <div class="form-group">
            <input type="text" id="reg-name" placeholder="الاسم بالكامل">
            <input type="tel" id="reg-phone" placeholder="رقم الموبايل">
            <input type="number" id="reg-age" placeholder="السن">
            <input type="number" id="reg-height" placeholder="الطول (سم)">
            <input type="number" id="reg-weight" placeholder="الوزن (كجم)">
            <select id="reg-program">
                <option>تنشيف</option><option>تضخيم</option><option>فتنس</option>
            </select>
            <button class="btn" onclick="register()">إرسال الطلب للكابتن 🚀</button>
        </div>
    </div>

    <!-- لوحة الكابتن -->
    <div id="screen-coach" class="screen">
        <h1 style="color:var(--primary); margin-bottom:20px;">لوحة القائد 🦁</h1>
        <div id="members-list">
            <p style="color:#666;">جارِ الاتصال بالخادم...</p>
        </div>
        <button class="btn" style="background:#222;" onclick="location.reload()">تحديث البيانات 🔄</button>
    </div>

    <script>
        // الكابتن
        const coachPhone = "01100896637"; 
        
        // ربط فيربيز
        try {
            const firebaseConfig = { projectId: "fire-gym-9c753" };
            firebase.initializeApp(firebaseConfig);
            var db = firebase.firestore();
        } catch(e) { console.log(e); }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function login() {
            const p = document.getElementById('login-phone').value;
            if(p === coachPhone) { showScreen('screen-coach'); loadMembers(); return; }
            
            try {
                const doc = await db.collection('users').doc(p).get();
                if(!doc.exists()) return alert("الرقم ده مش متسجل!");
                if(doc.data().status === 'pending') alert("الكابتن لسه مفقش على طلبك!");
                else alert("أهلاً بك يا بطل! (جاري فتح حسابك)");
            } catch(e) { alert("تأكد من فتح Rules في الفيربيز!"); }
        }

        async function register() {
            const p = document.getElementById('reg-phone').value;
            const n = document.getElementById('reg-name').value;
            if(!p || !n) return alert("املا البيانات يا بطل!");

            try {
                await db.collection('users').doc(p).set({
                    name: n, phone: p,
                    age: document.getElementById('reg-age').value,
                    weight: document.getElementById('reg-weight').value,
                    program: document.getElementById('reg-program').value,
                    status: 'pending',
                    timestamp: new Date()
                });
                alert("تم الإرسال! كلم الكابتن يوافق عليك.");
                showScreen('screen-login');
            } catch(e) { alert("حدث خطأ! اتأكد إنك فاتح الـ Rules"); }
        }

        function loadMembers() {
            db.collection('users').onSnapshot(snap => {
                let h = "";
                if(snap.empty) h = "<p style='color:#666;'>لا يوجد مشتركين حالياً</p>";
                snap.forEach(doc => {
                    const u = doc.data();
                    h += `
                        <div class="member-card" style="border-right-color:${u.status==='pending'?'#ff9800':'#4caf50'}">
                            <b>${u.name}</b> (${u.phone})<br>
                            <small>السن: ${u.age} | الوزن: ${u.weight} | ${u.program}</small><br>
                            <span class="status-${u.status}">${u.status==='pending'?'بانتظار الموافقة ⏳':'مفعل ✅'}</span>
                            ${u.status==='pending' ? `<button onclick="approve('${u.phone}')" style="background:#4caf50; color:#fff; border:none; padding:5px 10px; border-radius:5px; margin-right:10px;">موافقة</button>` : ''}
                        </div>
                    `;
                });
                document.getElementById('members-list').innerHTML = h;
            });
        }

        async function approve(p) {
            await db.collection('users').doc(p).update({ status: 'approved' });
            alert("تم التفعيل!");
        }
    </script>
</body>
</html>
