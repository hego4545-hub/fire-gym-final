<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fire Gym Mobile</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e53935;
            --primary-dark: #b71c1c;
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #ffffff;
            --text-muted: #aaaaaa;
            --accent: #ffb300;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            user-select: none;
            padding-bottom: 100px;
        }

        /* Hero Splash */
        .hero {
            height: 50vh;
            background: linear-gradient(rgba(18, 18, 18, 0.6), var(--bg)), url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80') center/cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            border-bottom: 2px solid var(--primary);
        }

        h1 {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #fff;
            text-shadow: 0 0 20px var(--primary);
        }

        .subtitle {
            font-size: 18px;
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 20px;
        }

        .main-btn {
            background: linear-gradient(45deg, var(--primary), var(--primary-dark));
            color: #fff;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            font-size: 18px;
            box-shadow: 0 10px 20px rgba(229, 57, 53, 0.4);
            display: inline-block;
        }

        /* Stats Row */
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 30px 10px;
            background: var(--surface);
            margin: -30px 15px 0;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }

        .stat-item { text-align: center; }
        .stat-num { color: var(--accent); font-size: 22px; font-weight: 900; }
        .stat-label { color: var(--text-muted); font-size: 12px; }

        .section-title {
            padding: 30px 20px 10px;
            text-align: right;
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
        }

        .plans-container {
            display: flex;
            overflow-x: auto;
            padding: 20px;
            gap: 15px;
        }

        .plan-card {
            flex: 0 0 80%;
            background: var(--surface);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .plan-card.active {
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(229, 57, 53, 0.2);
        }

        .plan-icon { font-size: 40px; margin-bottom: 10px; }
        .plan-price { 
            display: inline-block; 
            background: var(--primary); 
            padding: 5px 15px; 
            border-radius: 10px; 
            font-weight: 900; 
            margin-bottom: 15px;
            color: #fff;
        }

        .plan-btn {
            display: block;
            background: var(--primary);
            color: #fff;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(30, 30, 30, 0.98);
            display: flex;
            justify-content: space-around;
            padding: 15px 0 30px;
            border-top: 1px solid #333;
            z-index: 100;
        }

        .nav-item { color: var(--text-muted); text-decoration: none; font-size: 12px; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--primary); }

    </style>
</head>
<body>

    <div class="hero">
        <h1>FIRE GYM</h1>
        <div class="subtitle">PREMIUM FITNESS</div>
        <a href="https://wa.me/201100896637" class="main-btn">ابدأ رحلتك الآن</a>
    </div>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-num">+16</div>
            <div class="stat-label">سنة خبرة</div>
        </div>
        <div class="stat-item">
            <div class="stat-num">1500</div>
            <div class="stat-label">بطل أونلاين</div>
        </div>
        <div class="stat-item">
            <div class="stat-num">95%</div>
            <div class="stat-label">نسبة نجاح</div>
        </div>
    </div>

    <div class="section-title">أنظمة الاشتراك 🏆</div>
    <div class="plans-container">
        <div class="plan-card active">
            <div class="plan-icon">🏋️‍♂️</div>
            <h3>نظام التدريب</h3>
            <div class="plan-price">300 ج</div>
            <p style="color: var(--text-muted); margin-bottom: 15px;">برنامج مخصص ومتابعة أسبوعية</p>
            <a href="https://wa.me/201100896637" class="plan-btn">اشترك الآن</a>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="#" class="nav-item active"><span>🏠</span><span>الرئيسية</span></a>
        <a href="#" class="nav-item"><span>🔥</span><span>التحولات</span></a>
        <a href="#" class="nav-item"><span>💰</span><span>الباقات</span></a>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW registered'))
                .catch(err => console.log('SW error', err));
            });
        }
    </script>

</body>
</html>
